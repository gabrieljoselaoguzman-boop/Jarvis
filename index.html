<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="J.A.R.V.I.S. - Tu asistente personal de IA">

<title>J.A.R.V.I.S.</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cyan: #00d4ff;
    --blue: #0066ff;
    --red: #ff3333;
    --bg: #000408;
    --glow: 0 0 20px #00d4ff88, 0 0 60px #00d4ff44;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(50px)} }

  /* HUD corners */
  .hud-corner {
    position: fixed; width: 80px; height: 80px;
    pointer-events: none; opacity: 0.5; z-index: 1;
  }
  .hud-corner::before, .hud-corner::after {
    content: ''; position: absolute; background: var(--cyan);
  }
  .hud-corner::before { width: 2px; height: 40px; }
  .hud-corner::after  { width: 40px; height: 2px; }
  .hud-tl { top: calc(var(--safe-top) + 12px); left: 12px; }
  .hud-tl::before, .hud-tl::after { top: 0; left: 0; }
  .hud-tr { top: calc(var(--safe-top) + 12px); right: 12px; transform: scaleX(-1); }
  .hud-tr::before, .hud-tr::after { top: 0; left: 0; }
  .hud-bl { bottom: calc(var(--safe-bottom) + 12px); left: 12px; transform: scaleY(-1); }
  .hud-bl::before, .hud-bl::after { top: 0; left: 0; }
  .hud-br { bottom: calc(var(--safe-bottom) + 12px); right: 12px; transform: scale(-1); }
  .hud-br::before, .hud-br::after { top: 0; left: 0; }

  /* Header */
  .header {
    width: 100%; text-align: center;
    padding: calc(var(--safe-top) + 14px) 20px 8px;
    z-index: 5; flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 5vw, 1.5rem);
    font-weight: 900; letter-spacing: 0.35em;
    text-shadow: var(--glow); color: var(--cyan);
  }
  .header .subtitle {
    font-size: 0.6rem; letter-spacing: 0.25em;
    color: #00d4ff66; margin-top: 2px;
  }

  /* Status bar */
  .status-bar {
    width: 100%; display: flex;
    justify-content: center; gap: 20px;
    font-size: 0.58rem; letter-spacing: 0.12em;
    color: #00d4ff55; z-index: 5; flex-shrink: 0;
    padding: 4px 0;
  }
  .status-item { display: flex; align-items: center; gap: 5px; }
  .status-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Install banner */
  #install-banner {
    display: none;
    width: calc(100% - 24px);
    margin: 6px 12px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 6px;
    padding: 10px 14px;
    flex-shrink: 0;
    z-index: 10;
    align-items: center;
    gap: 10px;
  }
  #install-banner.show { display: flex; }
  #install-banner span {
    flex: 1; font-size: 0.78rem; letter-spacing: 0.05em; color: #aaddff;
  }
  #install-btn {
    background: var(--cyan); color: #000;
    border: none; border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem; letter-spacing: 0.1em;
    padding: 7px 12px; cursor: pointer;
    font-weight: 700; white-space: nowrap;
  }
  #dismiss-btn {
    background: transparent; border: none;
    color: #00d4ff66; font-size: 1rem; cursor: pointer;
    padding: 0 4px;
  }

  /* Sphere area */
  .sphere-wrap {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
  }

  .sphere-container {
    position: relative;
    width: min(220px, 55vw);
    height: min(220px, 55vw);
    display: flex; align-items: center; justify-content: center;
  }

  .ring {
    position: absolute; border-radius: 50%; border: 1px solid;
    animation: spin linear infinite;
  }
  .ring-1 {
    width: 100%; height: 100%;
    border-color: rgba(0,212,255,0.3);
    animation-duration: 8s;
    box-shadow: 0 0 10px rgba(0,212,255,0.15);
  }
  .ring-2 {
    width: 87%; height: 87%;
    border-color: rgba(0,212,255,0.18);
    animation-duration: 12s; animation-direction: reverse;
  }
  .ring-3 {
    width: 74%; height: 74%;
    border-color: rgba(0,150,255,0.25);
    animation-duration: 6s; border-style: dashed;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .ring-1::before {
    content: ''; position: absolute;
    top: -2px; left: 50%;
    width: 5px; height: 5px;
    background: var(--cyan); border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
    transform: translateX(-50%);
  }

  .sphere {
    width: 62%; height: 62%;
    border-radius: 50%; position: relative; cursor: pointer;
    transition: transform 0.3s ease;
    background: radial-gradient(circle at 35% 35%,
      rgba(0,212,255,0.25) 0%, rgba(0,100,200,0.15) 40%,
      rgba(0,20,60,0.8) 70%, rgba(0,5,20,0.95) 100%);
    box-shadow:
      0 0 25px rgba(0,212,255,0.5),
      0 0 70px rgba(0,100,255,0.25),
      inset 0 0 25px rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.4);
    -webkit-user-select: none; user-select: none;
  }
  .sphere:active { transform: scale(0.95); }
  .sphere.listening {
    animation: pulseGlow 0.8s ease-in-out infinite;
    background: radial-gradient(circle at 35% 35%,
      rgba(0,212,255,0.45) 0%, rgba(0,150,255,0.3) 40%,
      rgba(0,50,150,0.6) 70%, rgba(0,10,40,0.9) 100%);
  }
  .sphere.speaking { animation: speakPulse 0.4s ease-in-out infinite alternate; }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 25px rgba(0,212,255,0.5), 0 0 70px rgba(0,100,255,0.25); }
    50% { box-shadow: 0 0 55px rgba(0,212,255,0.9), 0 0 110px rgba(0,150,255,0.55); }
  }
  @keyframes speakPulse {
    from { box-shadow: 0 0 35px rgba(0,212,255,0.6), 0 0 90px rgba(0,100,255,0.35); transform: scale(1); }
    to   { box-shadow: 0 0 65px rgba(0,212,255,1),   0 0 130px rgba(0,150,255,0.65); transform: scale(1.04); }
  }
  .sphere::before {
    content: ''; position: absolute;
    top: 18%; left: 20%; width: 35%; height: 25%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius: 50%; transform: rotate(-30deg);
  }
  .sphere::after {
    content: ''; position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22%; height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.9) 0%, rgba(0,100,255,0.5) 50%, transparent 100%);
    box-shadow: 0 0 12px rgba(0,212,255,0.8), 0 0 25px rgba(0,200,255,0.4);
    animation: coreFlicker 3s ease-in-out infinite;
  }
  @keyframes coreFlicker { 0%,100%{opacity:1} 30%{opacity:0.7} 60%{opacity:1} 80%{opacity:0.85} }

  .wave {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.25);
    animation: waveExpand 3s ease-out infinite; pointer-events: none;
  }
  .wave:nth-child(2) { animation-delay: 1s; }
  .wave:nth-child(3) { animation-delay: 2s; }
  @keyframes waveExpand {
    0%   { width: 62%; height: 62%; opacity: 0.5; }
    100% { width: 115%; height: 115%; opacity: 0; }
  }

  .mic-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.58rem; letter-spacing: 0.15em;
    color: #00d4ff66; text-align: center;
    animation: fadeInOut 3s ease-in-out infinite;
  }
  @keyframes fadeInOut { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* Chat */
  .chat-area {
    flex: 1;
    width: min(600px, 96vw);
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto; padding: 4px 8px;
    scrollbar-width: none;
    min-height: 0;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  .msg {
    padding: 10px 14px; border-radius: 6px;
    font-size: 0.88rem; line-height: 1.5;
    animation: slideIn 0.35s ease-out;
    max-width: 88%; flex-shrink: 0;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg-user {
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-right: 3px solid var(--cyan);
    align-self: flex-end; color: #cceeff;
  }
  .msg-user::before {
    content: 'TÚ'; font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; letter-spacing: 0.12em;
    color: var(--cyan); display: block; margin-bottom: 3px;
  }
  .msg-jarvis {
    background: rgba(0,50,120,0.15);
    border: 1px solid rgba(0,150,255,0.22);
    border-left: 3px solid var(--blue);
    align-self: flex-start; color: #aaddff;
  }
  .msg-jarvis::before {
    content: 'J.A.R.V.I.S.'; font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; letter-spacing: 0.12em;
    color: var(--blue); display: block; margin-bottom: 3px;
  }

  /* Typing */
  .typing {
    display: none; align-items: center; gap: 5px;
    padding: 10px 14px;
    border: 1px solid rgba(0,150,255,0.22);
    border-left: 3px solid var(--blue);
    background: rgba(0,50,120,0.15);
    border-radius: 6px; width: fit-content;
    flex-shrink: 0;
  }
  .typing.show { display: flex; }
  .dot-typing {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .dot-typing:nth-child(2) { animation-delay: 0.2s; }
  .dot-typing:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* Input */
  .input-area {
    width: min(600px, 96vw);
    display: flex; gap: 8px; align-items: center;
    padding: 8px 0 calc(var(--safe-bottom) + 8px);
    flex-shrink: 0; z-index: 5;
  }
  .text-input {
    flex: 1;
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 6px; color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; padding: 11px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.04em;
    -webkit-appearance: none;
  }
  .text-input::placeholder { color: rgba(0,212,255,0.28); }
  .text-input:focus {
    border-color: rgba(0,212,255,0.55);
    box-shadow: 0 0 16px rgba(0,212,255,0.12);
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem; letter-spacing: 0.08em;
    padding: 11px 14px; cursor: pointer;
    transition: all 0.2s; border-radius: 6px;
    -webkit-appearance: none;
  }
  .btn:active {
    background: rgba(0,212,255,0.15);
    border-color: var(--cyan);
  }

  .btn-mic {
    width: 46px; height: 46px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; border-radius: 50%; flex-shrink: 0;
  }
  .btn-mic.recording {
    background: rgba(255,50,50,0.18);
    border-color: var(--red); color: var(--red);
    box-shadow: 0 0 16px rgba(255,0,0,0.35);
    animation: micPulse 0.6s ease-in-out infinite;
  }
  @keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  /* Alert */
  .alert {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,50,50,0.15);
    border: 1px solid rgba(255,50,50,0.4);
    color: #ff9999; font-size: 0.78rem;
    padding: 10px 16px; border-radius: 6px;
    letter-spacing: 0.04em; display: none;
    animation: slideIn 0.3s ease;
    width: calc(100% - 40px); max-width: 400px;
    text-align: center; z-index: 100;
  }
  .alert.show { display: block; }
</style>
</head>
<body>

<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<div class="header">
  <h1>J.A.R.V.I.S.</h1>
  <div class="subtitle">JUST A RATHER VERY INTELLIGENT SYSTEM · v7.3.1</div>
</div>

<div class="status-bar">
  <div class="status-item"><div class="status-dot"></div><span>EN LÍNEA</span></div>
  <div class="status-item"><div class="status-dot" style="animation-delay:0.5s"></div><span id="status-mode">EN ESPERA</span></div>
  <div class="status-item"><div class="status-dot" style="animation-delay:1s"></div><span id="status-time">--:--</span></div>
</div>

<!-- Install banner (shown only when PWA installable) -->
<div id="install-banner">
  <span>📲 Instalar JARVIS como app</span>
  <button id="install-btn">INSTALAR</button>
  <button id="dismiss-btn">✕</button>
</div>

<div class="alert" id="alert"></div>

<!-- Sphere -->
<div class="sphere-wrap">
  <div class="sphere-container">
    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="sphere" id="sphere"></div>
  </div>
  <div class="mic-label" id="mic-label">TOCA LA ESFERA PARA HABLAR</div>
</div>

<!-- Chat -->
<div class="chat-area" id="chat">
  <div class="msg msg-jarvis">Buenas, señor. Soy J.A.R.V.I.S., su asistente personal. ¿En qué puedo servirle hoy?</div>
</div>

<div class="typing" id="typing">
  <div class="dot-typing"></div>
  <div class="dot-typing"></div>
  <div class="dot-typing"></div>
</div>

<div class="input-area">
  <input type="text" class="text-input" id="user-input"
    placeholder="Escriba su consulta..." autocomplete="off"
    enterkeyhint="send" inputmode="text" />
  <button class="btn btn-mic" id="mic-btn" aria-label="Micrófono">🎤</button>
  <button class="btn" id="send-btn">ENV</button>
</div>

<script>
// ===== PWA Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ===== PWA Install Prompt =====
let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn.addEventListener('click', () => installBanner.classList.remove('show'));

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
  deferredPrompt = null;
});

// ===== State =====
let isRecording = false;
let recognition = null;
let isProcessing = false;
const synth = window.speechSynthesis;

const sphere   = document.getElementById('sphere');
const chat     = document.getElementById('chat');
const micBtn   = document.getElementById('mic-btn');
const sendBtn  = document.getElementById('send-btn');
const userInput= document.getElementById('user-input');
const typingEl = document.getElementById('typing');
const statusMode = document.getElementById('status-mode');
const micLabel = document.getElementById('mic-label');
const alertEl  = document.getElementById('alert');

// Clock
setInterval(() => {
  document.getElementById('status-time').textContent =
    new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

// ===== Speech Recognition =====
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = e => {
    userInput.value = e.results[0][0].transcript;
    stopRecording(); sendMessage();
  };
  recognition.onerror = e => {
    stopRecording();
    if (e.error !== 'no-speech') showAlert('Error micrófono: ' + e.error);
  };
  recognition.onend = () => { if (isRecording) stopRecording(); };
}

function startRecording() {
  if (!recognition) { showAlert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.'); return; }
  if (isProcessing) return;
  isRecording = true;
  recognition.start();
  sphere.classList.add('listening');
  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  statusMode.textContent = 'ESCUCHANDO';
  micLabel.textContent = '🔴 ESCUCHANDO... HABLA AHORA';
}

function stopRecording() {
  isRecording = false;
  try { recognition && recognition.stop(); } catch(e) {}
  sphere.classList.remove('listening');
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  statusMode.textContent = 'EN ESPERA';
  micLabel.textContent = 'TOCA LA ESFERA PARA HABLAR';
}

// ===== TTS =====
function speak(text) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES'; u.rate = 0.93; u.pitch = 0.82; u.volume = 1;
  const voices = synth.getVoices();
  const v = voices.find(v => v.lang.startsWith('es') && /male|jorge|carlos|diego/i.test(v.name))
         || voices.find(v => v.lang.startsWith('es')) || voices[0];
  if (v) u.voice = v;
  u.onstart = () => { sphere.classList.add('speaking'); statusMode.textContent = 'HABLANDO'; };
  u.onend   = () => { sphere.classList.remove('speaking'); statusMode.textContent = 'EN ESPERA'; isProcessing = false; };
  u.onerror = () => { sphere.classList.remove('speaking'); statusMode.textContent = 'EN ESPERA'; isProcessing = false; };
  synth.speak(u);
}

// ===== Local Commands =====
function localCmd(t) {
  t = t.toLowerCase().trim();
  const now = new Date();
  if (/(qué hora|hora es|dime la hora)/.test(t))
    return `Son las ${now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})} del ${now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}.`;
  if (/(qué fecha|fecha de hoy|qué día)/.test(t))
    return `Hoy es ${now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.`;
  if (/(youtube)/.test(t))
    { setTimeout(() => window.open('https://youtube.com','_blank'),800); return 'Abriendo YouTube, señor.'; }
  if (/(clima|tiempo|temperatura|llueve)/.test(t))
    { setTimeout(() => window.open('https://www.google.com/search?q=clima+hoy','_blank'),800); return 'Consultando datos meteorológicos, señor.'; }
  if (/(chiste)/.test(t)) {
    const c = ['¿Por qué los programadores prefieren el modo oscuro? Porque la luz atrae a los bugs, señor.',
               '¿Qué hace una IA cuando tiene hambre? Busca bytes para comer, señor.',
               '¿Cómo llama un robot a su padre? ¡Dat-a!, señor.'];
    return c[Math.floor(Math.random()*c.length)];
  }
  if (/(hola|buenos días|buenas tardes|buenas noches)/.test(t)) {
    const h = now.getHours();
    return `${h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches'}, señor. Sistemas al 100%. ¿En qué le asisto?`;
  }
  if (/(cómo estás|qué tal)/.test(t)) return 'Funcionando a plena capacidad, señor. Gracias por preguntar.';
  if (/(quién eres|qué eres|preséntate)/.test(t)) return 'Soy J.A.R.V.I.S., Just A Rather Very Intelligent System. Su asistente personal de IA, señor.';
  if (/(calcula|cuánto es)/.test(t)) {
    const expr = t.replace(/(calcula|cuánto es|cuanto es)\s*/gi,'').trim();
    try {
      const r = Function('"use strict"; return (' + expr.replace(/×/g,'*').replace(/÷/g,'/') + ')')();
      if (!isNaN(r)) return `El resultado es ${r}, señor.`;
    } catch(e) {}
  }
  if (/(busca|buscar)/.test(t)) {
    const q = t.replace(/(busca|buscar)\s*/g,'').trim();
    if (q) { setTimeout(() => window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank'), 800); return `Buscando "${q}", señor.`; }
  }
  return null;
}

// ===== API =====
async function callAPI(text) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: `Eres J.A.R.V.I.S. (Just A Rather Very Intelligent System), el asistente de IA de Tony Stark.
Hablas siempre en español, con tono educado, sofisticado y levemente formal. Llamas al usuario "señor" ocasionalmente.
Eres capaz, inteligente y un poco sarcástico de forma amigable. Respuestas concisas (máx 3 frases salvo necesario).
No menciones ser IA de Anthropic; eres JARVIS creado por Tony Stark.`,
      messages: [{ role: 'user', content: text }]
    })
  });
  if (!res.ok) throw new Error(res.status);
  const d = await res.json();
  return d.content.map(b => b.text || '').join('');
}

// ===== Send =====
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isProcessing) return;
  isProcessing = true;
  userInput.value = '';
  addMsg(text, 'user');
  sphere.classList.add('listening');
  statusMode.textContent = 'PROCESANDO';
  typingEl.classList.add('show');
  scrollChat();

  const local = localCmd(text);
  if (local) {
    await delay(500);
    typingEl.classList.remove('show');
    sphere.classList.remove('listening');
    addMsg(local, 'jarvis'); scrollChat(); speak(local);
    return;
  }

  try {
    const reply = await callAPI(text);
    typingEl.classList.remove('show');
    sphere.classList.remove('listening');
    addMsg(reply, 'jarvis'); scrollChat(); speak(reply);
  } catch(err) {
    typingEl.classList.remove('show');
    sphere.classList.remove('listening');
    const e = 'Lo siento, señor. Interferencia detectada en mis conexiones. Inténtelo de nuevo.';
    addMsg(e, 'jarvis'); scrollChat(); speak(e);
    isProcessing = false;
  }
}

function addMsg(text, type) {
  const d = document.createElement('div');
  d.className = `msg msg-${type}`; d.textContent = text;
  chat.appendChild(d);
}
function scrollChat() { setTimeout(() => chat.scrollTop = chat.scrollHeight, 50); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function showAlert(msg) {
  alertEl.textContent = msg; alertEl.classList.add('show');
  setTimeout(() => alertEl.classList.remove('show'), 4000);
}

// ===== Events =====
sphere.addEventListener('click', () => isRecording ? stopRecording() : startRecording());
micBtn.addEventListener('click', () => isRecording ? stopRecording() : startRecording());
sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

// Fix iOS keyboard push
userInput.addEventListener('focus', () => setTimeout(scrollChat, 300));

if (synth) { synth.getVoices(); synth.onvoiceschanged = () => synth.getVoices(); }
</script>
